<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <title>EduKids Adventure - Game Edukasi Premium</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- PARTICLE CONTAINER -->
    <div id="particleContainer" class="particle-container"></div>
    <div id="confettiContainer" class="confetti-container"></div>

    <!-- CHARACTER GUIDE -->
    <div id="characterGuide" class="character-guide">
        <div class="character-bubble" id="guideBubble">
            <span id="guideText">Halo! Aku EduBot! 👋</span>
        </div>
        <div class="character-avatar" id="guideAvatar">🤖</div>
    </div>

    <!-- SPLASH SCREEN -->
    <div id="splash" class="screen active">
        <div class="splash-content">
            <div class="logo">🎓</div>
            <h1>EduKids Adventure</h1>
            <p>Belajar Sambil Bermain!</p>
            <div class="loader"></div>
        </div>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="login" class="screen">
        <div class="container">
            <div class="card">
                <h1>👋 Selamat Datang!</h1>
                <p>Masukkan nama untuk mulai bermain</p>
                
                <input type="text" id="nameInput" placeholder="Nama Kamu" maxlength="20">
                <input type="number" id="ageInput" placeholder="Usia (4-12)" min="4" max="12">
                
                <h3>Pilih Avatar:</h3>
                <div class="avatar-grid" id="avatarGrid"></div>
                
                <button class="btn-primary" onclick="login()">🚀 Mulai Petualangan!</button>
                <button class="btn-secondary" onclick="toggleDarkMode()"> Mode Gelap</button>
            </div>
        </div>
    </div>

    <!-- MAIN MENU -->
    <div id="main" class="screen">
        <div class="top-bar">
            <div class="player-info">
                <span class="avatar" id="mainAvatar"></span>
                <div>
                    <div class="player-name" id="playerName">Nama</div>
                    <div class="player-level">Level <span id="playerLevel">1</span></div>
                </div>
            </div>
            <div class="stats">
                <div class="stat">⭐ <span id="xpDisplay">0</span> XP</div>
                <div class="stat">💰 <span id="coinDisplay">0</span></div>
                <button class="icon-btn" onclick="toggleSettings()">⚙️</button>
            </div>
        </div>

        <div class="xp-bar-container">
            <div class="xp-bar" id="xpBar"></div>
            <span class="xp-text" id="xpText">0 / 100 XP</span>
        </div>

        <div class="main-content" id="mainContent">
            <!-- DAILY MISSIONS -->
            <div class="daily-missions">
                <h2>📋 Misi Hari Ini</h2>
                <div class="missions-grid" id="missionsGrid"></div>
            </div>

            <!-- ADVENTURE PATH -->
            <h2>🗺️ Peta Petualangan</h2>
            <div class="adventure-path" id="adventurePath"></div>

            <!-- ACTION BUTTONS -->
            <div class="action-buttons">
                <button class="btn-action" onclick="showAchievements()">🏆 Pencapaian</button>
                <button class="btn-action" onclick="showShop()">🛒 Toko</button>
                <button class="btn-action" onclick="showParentDashboard()">‍👩‍👧 Orang Tua</button>
                <button class="btn-action" onclick="claimDailyReward()"> Hadiah</button>
            </div>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game" class="screen">
        <div class="game-header">
            <button class="back-btn" onclick="exitGame()">⬅️ Kembali</button>
            <h2 id="gameTitle">Game</h2>
            <div class="game-score">⭐ <span id="gameScore">0</span></div>
        </div>
        <div class="game-content" id="gameContent"></div>
    </div>

    <!-- MODAL -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">✖️</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- NOTIFICATION -->
    <div id="notification" class="notification"></div>

    <script src="app.js"></script>
</body>
</html>
